connector.name=iceberg

# Use REST catalog (same as Spark)
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=${ENV:ICEBERG_REST_URI}

# Warehouse (must match Iceberg REST)
iceberg.rest-catalog.warehouse=s3://${ENV:ICEBERG_BUCKET}/

# S3 / MinIO config
fs.native-s3.enabled=true
s3.endpoint=${ENV:MINIO_PROTOCOL}://${ENV:MINIO_HOST}:${ENV:MINIO_PORT}
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
s3.path-style-access=true

# Optional but recommended
iceberg.file-format=PARQUET
s3.region=${ENV:AWS_REGION}

